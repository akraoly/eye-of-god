version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: eye-of-god-backend
    ports:
      - "8001:8001"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: eye-of-god-frontend
    working_dir: /app
    volumes:
      - ../frontend/web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8001/api
    depends_on:
      - backend
